name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master

# Si entra un nuevo push mientras el deploy anterior sigue corriendo,
# cancelamos el viejo. Evita stacks de runs colgados (clásico con lftp
# trabado por antivirus de Hostinger lockeando archivos).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build Project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "=== ENV DIAGNOSTIC (lengths only, no values) ==="
          echo "VITE_SUPABASE_URL length: ${#VITE_SUPABASE_URL}"
          echo "VITE_SUPABASE_ANON_KEY length: ${#VITE_SUPABASE_ANON_KEY}"
          echo "================================================="
          # Supabase env vars: warning si faltan/estan rotas, pero NO
          # exit 1. supabase.js tiene FALLBACK hardcoded que arranca el
          # bundle con la URL/anon-key publicas si las env vars estan
          # vacias. Mejor un deploy funcionando con fallback que un
          # deploy bloqueado y prod rota.
          if [[ ! "$VITE_SUPABASE_URL" =~ ^https://[a-z0-9-]+\.supabase\.co$ ]]; then
            echo "::warning::VITE_SUPABASE_URL no tiene formato valido (recibido len=${#VITE_SUPABASE_URL}). El bundle usara FALLBACK_URL de supabase.js. Revisa GitHub Secrets cuando puedas."
          fi
          if [[ "${#VITE_SUPABASE_ANON_KEY}" -lt 20 ]]; then
            echo "::warning::VITE_SUPABASE_ANON_KEY es sospechosamente corto (len=${#VITE_SUPABASE_ANON_KEY}). El bundle usara FALLBACK_KEY de supabase.js. Revisa GitHub Secrets cuando puedas."
          fi
          npm run build

      # lftp con xfer:clobber on + ftp:use-allo off para que suba cada
      # archivo con su nombre final y evite el patron .in.<file> + rename
      # que Hostinger rompe (su antivirus/sync quita dotfiles antes del
      # rename y devuelve 550 No such file or directory).
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # FAIL-FAST: verifica que el FTP responda y que el login sea valido
      # ANTES de lanzar el mirror largo. Distingue "server caido / credencial
      # invalida" (abortamos en <60s) de "server arriba pero AV lockeando
      # archivos" (dejamos que el mirror reintente, que es el caso legitimo
      # para el que estan tuneados los timeouts largos de abajo).
      #
      # Incidente 2026-05-24 (run 26372323353): el FTP de Hostinger dejo de
      # responder y el mirror colgo 28m57s reintentando con "max-retries
      # exceeded" en cada archivo. Subir los timeouts solo hizo el fallo mas
      # largo, no lo evito. Este preflight corta de raiz ese caso.
      #
      # Budget: net:timeout 15 x max-retries 1 + 1 reconnect ~= 35s, con un
      # hard ceiling de 60s via coreutils `timeout`.
      - name: FTP preflight (fail-fast)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "::error::Faltan secrets FTP (FTP_SERVER / FTP_USERNAME / FTP_PASSWORD). Cargalos en Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "Probando conexion FTP a $FTP_SERVER (budget ~60s)..."
          if ! timeout 60 lftp -c "
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set net:timeout 15;
          set net:max-retries 1;
          set net:reconnect-interval-base 3;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER';
          pwd;
          "; then
            echo "::error::FTP preflight fallo — el servidor de Hostinger no respondio o las credenciales son invalidas. Deploy abortado en fail-fast (NO se intento el mirror para no colgar el runner ~29 min). Verifica: (1) que el FTP de Hostinger este arriba probando login con FileZilla, (2) que la cuenta/hosting no este suspendida, (3) que los secrets FTP sigan vigentes."
            exit 1
          fi
          echo "✓ FTP responde y login OK — procediendo al mirror."

      # NOTA sobre --no-perms:
      # Hostinger no le permite a este FTP user hacer `SITE CHMOD`. lftp
      # por default intenta preservar permisos del archivo local y emite
      # un chmod después de cada PUT, lo que devuelve 550 y aborta todo
      # el mirror. `--no-perms` lo saltea — los archivos quedan con los
      # perms default del usuario FTP (typically 644 / 755), que es lo
      # que necesitamos.
      #
      # NOTA sobre --ignore-time + bash retry (en vez de --loop):
      # El antivirus de Hostinger lockea archivos individuales durante
      # el upload (550 transiente) Y modifica el mtime tras escanear.
      # Con --loop nativo de lftp, el cambio de mtime hacía que cada
      # iteración detectara TODOS los archivos como modificados → loop
      # infinito (corrida real: 24min sin terminar).
      #
      # Fix: --ignore-time compara solo por size (el AV no toca el size,
      # solo el mtime). Y envolvemos el lftp en un retry bash con tope
      # de 3 intentos — total bounded a ~5-10 min worst case en vez de
      # loop infinito.
      #
      # NOTA sobre --delete:
      # Con chunks hasheados (vite.config.js: chunkFileNames con [hash])
      # cada build produce nombres únicos. `mirror --delete` intenta
      # borrar los hashes viejos del server, pero el antivirus de
      # Hostinger los suele tener lockeados al momento del DELETE y
      # devuelve "550 No such file" → lftp exit 1 → workflow rojo
      # AUNQUE el upload de los archivos nuevos haya completado bien.
      #
      # Solución: dropear --delete. Los chunks viejos quedan huérfanos
      # (5-30KB cada uno, ningún index.html actual los referencia, no
      # rompen nada). Si la acumulación molesta a futuro, una limpieza
      # manual periódica via FileZilla o un cron de Hostinger barre
      # `dist/assets/*-<hash>.js` con timestamp > 30 días.
      #
      # .builds/ lo crea el sistema interno de Hostinger; lo seguimos
      # excluyendo por las dudas.
      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        # Timeouts ajustados (2026-05-24, segundo pase). Pase anterior fue
        # demasiado agresivo: timeout 20s × retries 3 = AV de Hostinger
        # lockea archivos por 30-60s y el budget se agotaba en el primer
        # intento real (run 26354012841 fallo en 9m con max-retries
        # exceeded en index.html). Subimos a timeout 40s × retries 5 ×
        # backoff 1.4 + max=3 outer attempts. Worst case ~12 min — mas que
        # los 3 min del pase anterior pero suficiente para sobrevivir
        # lockouts tipicos del AV sin abortar el deploy.
        # Cada intento del mirror va envuelto en `timeout 240` (hard ceiling
        # por intento): el preflight ya confirmo conectividad, asi que si el
        # server se cae A MITAD del deploy, cortamos el intento a los 4 min en
        # vez de dejar que lftp queme timeout 40 x 5 retries por archivo. Con
        # max=3 intentos + sleeps de 15s, el worst case queda acotado a ~12 min
        # (vs los ~29 min del incidente). `timeout` devuelve 124 al cortar, que
        # dispara el retry del loop bash igual que cualquier otro fallo.
        run: |
          attempt=0
          max=3
          until timeout 240 lftp -c "
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set net:timeout 40;
          set net:max-retries 5;
          set net:reconnect-interval-base 5;
          set net:reconnect-interval-multiplier 1.4;
          set xfer:clobber on;
          set ftp:use-allo off;
          set mirror:parallel-transfer-count 1;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER';
          mirror --reverse --verbose --parallel=1 --no-perms --ignore-time --exclude-glob .ftp-deploy-sync-state.json --exclude '(^|\/)\.builds(\/|$)' ./dist/ ./;
          put ./dist/index.html -o index.html;
          " || [ $attempt -ge $max ]; do
            attempt=$((attempt + 1))
            echo "::warning::lftp mirror falló (intento $attempt/$max). Reintentando en 15s..."
            sleep 15
          done
          if [ $attempt -ge $max ]; then
            echo "::error::lftp mirror falló después de $max intentos."
            exit 1
          fi

      # H7.1 — smoke test post-deploy de higoapp.com.
      # Verifica que el index.html servido contenga el title canonico.
      # Hostinger a veces sirve HTML viejo 5-10s post-upload (caché del
      # MTA / antivirus); reintentamos hasta 3 veces con backoff.
      # Si las 3 fallan, el workflow se marca rojo aunque el upload haya
      # completado: el deploy quedo en estado invalido y hay que mirarlo.
      - name: Smoke test higoshop.store
        run: |
          echo "Esperando 10s para que Hostinger sirva el HTML nuevo..."
          sleep 10
          for i in 1 2 3; do
            echo "Smoke test intento $i/3..."
            if curl -fsS -o /tmp/index.html --max-time 20 "https://higoshop.store/?cb=$(date +%s)"; then
              if grep -q "Agencia de Viajes" /tmp/index.html; then
                echo "✓ Smoke test OK — title encontrado en HTML servido."
                exit 0
              else
                echo "::warning::HTML sirvio pero NO contiene 'Agencia de Viajes'. Posible cache o deploy parcial."
              fi
            else
              echo "::warning::curl fallo en intento $i."
            fi
            sleep 5
          done
          echo "::error::Smoke test fallo despues de 3 intentos. higoshop.store puede estar sirviendo HTML viejo o roto."
          exit 1

      # higodriver.com vive en un hosting Hostinger separado (FTP user
      # u841591024.higodriver.com, path public_html). Subimos ./higodriver/
      # entero, no solo el .php — incluye también el index.html del landing.
      #
      # Guard: si el secret HIGODRIVER_FTP_PASSWORD no está configurado,
      # skipeamos sin romper el job — útil mientras se cargan los secrets.
      - name: Deploy higodriver via lftp
        env:
          HIGODRIVER_FTP_SERVER: ${{ secrets.HIGODRIVER_FTP_SERVER }}
          HIGODRIVER_FTP_USERNAME: ${{ secrets.HIGODRIVER_FTP_USERNAME }}
          HIGODRIVER_FTP_PASSWORD: ${{ secrets.HIGODRIVER_FTP_PASSWORD }}
        run: |
          if [ -z "$HIGODRIVER_FTP_PASSWORD" ]; then
            echo "::warning::HIGODRIVER_FTP_PASSWORD no está configurado — skipeando deploy de higodriver.com. Agregalo en Settings > Secrets para habilitar."
            exit 0
          fi
          attempt=0
          max=3
          until lftp -c "
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set net:timeout 60;
          set net:max-retries 10;
          set net:reconnect-interval-base 5;
          set net:reconnect-interval-multiplier 1.5;
          set xfer:clobber on;
          set ftp:use-allo off;
          set mirror:parallel-transfer-count 1;
          open -u '$HIGODRIVER_FTP_USERNAME','$HIGODRIVER_FTP_PASSWORD' '$HIGODRIVER_FTP_SERVER';
          mirror --reverse --verbose --parallel=1 --no-perms --ignore-time --exclude-glob .ftp-deploy-sync-state.json --exclude '(^|\/)\.builds(\/|$)' ./higodriver/ ./;
          " || [ $attempt -ge $max ]; do
            attempt=$((attempt + 1))
            echo "::warning::lftp higodriver mirror falló (intento $attempt/$max). Reintentando en 15s..."
            sleep 15
          done
          if [ $attempt -ge $max ]; then
            echo "::error::lftp higodriver mirror falló después de $max intentos."
            exit 1
          fi
